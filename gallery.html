<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mehndi Gallery | Sherin Mehndi Artist</title>

    <meta name="description"
        content="Explore premium bridal mehndi designs in Sankarapuram & Kallakurichi. Organic henna, dark stain guarantee." />

    <link rel="stylesheet" href="/style.css" />

    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        .gallery-filter {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: 1px solid #ccc;
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            cursor: pointer;
        }

        .filter-btn.active {
            background: #c49b63;
            color: white;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            grid-auto-rows: 350px;
            gap: 1rem;
        }

        .gallery-item {
            overflow: hidden;
            border-radius: 6px;
            position: relative;
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.4s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.08);
        }

        .gallery-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            opacity: 0;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 2rem;
        }

        .gallery-item:hover .gallery-overlay {
            opacity: 1;
        }

        .empty-message {
            text-align: center;
            padding: 3rem;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <header>
        <div style="padding:20px;text-align:center;font-weight:bold;font-size:24px;">
            Sherin Mehndi Artist
        </div>
    </header>

    <!-- Page Title -->
    <section style="padding:6rem 0 3rem;text-align:center;">
        <h1>Our Gallery</h1>
        <p>A collection of bridal mehndi moments.</p>
    </section>

    <!-- Gallery -->
    <section>
        <div class="gallery-filter">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="bridal">Bridal</button>
            <button class="filter-btn" data-filter="engagement">Engagement</button>
            <button class="filter-btn" data-filter="arabic">Arabic</button>
        </div>

        <div class="gallery-grid" id="gallery-grid">
            <!-- Dynamic Images Here -->
        </div>
    </section>

    <script>
        // 🔥 ADD YOUR REAL KEYS HERE
        const SUPABASE_URL = "YOUR_SUPABASE_URL";
        const SUPABASE_ANON_KEY = "YOUR_PUBLIC_ANON_KEY";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        const galleryGrid = document.getElementById("gallery-grid");
        const filterBtns = document.querySelectorAll(".filter-btn");

        let galleryData = [];

        async function loadGallery() {
            const { data, error } = await supabaseClient
                .from("gallery")
                .select("*")
                .order("created_at", { ascending: false });

            if (error) {
                console.error(error);
                galleryGrid.innerHTML = "<p class='empty-message'>Error loading images</p>";
                return;
            }

            galleryData = data;
            renderGallery("all");
        }

        function renderGallery(filter) {
            galleryGrid.innerHTML = "";

            const filteredData = filter === "all"
                ? galleryData
                : galleryData.filter(item => item.category === filter);

            if (filteredData.length === 0) {
                galleryGrid.innerHTML =
                    "<p class='empty-message'>No images available</p>";
                return;
            }

            filteredData.forEach(item => {
                const div = document.createElement("div");
                div.classList.add("gallery-item");

                div.innerHTML = `
                    <img src="${item.image_url}" alt="Gallery Image" loading="lazy">
                    <div class="gallery-overlay">+</div>
                `;

                galleryGrid.appendChild(div);
            });
        }

        // Filter Buttons
        filterBtns.forEach(btn => {
            btn.addEventListener("click", () => {
                filterBtns.forEach(b => b.classList.remove("active"));
                btn.classList.add("active");

                const filter = btn.getAttribute("data-filter");
                renderGallery(filter);
            });
        });

        loadGallery();
    </script>

</body>

</html>
